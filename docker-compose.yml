services:
  power-safety-ua:
    image: webyhomelab/power-safety-ua:latest
    container_name: power-safety-ua
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 100
    user: "1000:1000"
    ports:
      - "${PORT_BINDING:-127.0.0.1}:5050:5050"
    read_only: true
    tmpfs:
      - /tmp:size=50M
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - TZ=Europe/Kyiv
      - MPLCONFIGDIR=/tmp/matplotlib
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health/live', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  background-worker:
    image: webyhomelab/power-safety-ua:latest
    container_name: power-safety-ua-worker
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 100
    user: "1000:1000"
    command: python app/run_background.py
    read_only: true
    tmpfs:
      - /tmp:size=50M
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - TZ=Europe/Kyiv
      - MPLCONFIGDIR=/tmp/matplotlib
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      disable: true
