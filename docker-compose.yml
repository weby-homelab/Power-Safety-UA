services:
  flash-monitor:
    image: webyhomelab/flash-monitor-kyiv:latest
    container_name: flash-monitor
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  background-worker:
    image: webyhomelab/flash-monitor-kyiv:latest
    container_name: flash-monitor-worker
    restart: unless-stopped
    command: python app/run_background.py
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    healthcheck:
      disable: true